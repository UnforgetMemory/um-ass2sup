[package]
name = "subtitle-renderer"
version = "0.1.0"
edition = "2021"
description = "ASS/SRT subtitle rendering to RGBA bitmaps with font management, text shaping, and effects"

[dependencies]
thiserror = "1"
tracing = "0.1"
fontdb = "0.16"
rustybuzz = "0.14"
ttf-parser = "0.21"
tiny-skia = "0.11"
ass-parser = { path = "../ass-parser" }
wide = "0.7"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "renderer"
harness = false
