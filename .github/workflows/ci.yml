name: CI

on:
  push:
    branches: [master, dev-**]
  pull_request:
    branches: [master, dev-**]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: clippy (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }} / stable)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System deps (linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfontconfig1-dev fonts-dejavu-core
      - name: System deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install fontconfig
      - name: cargo test
        run: cargo test --workspace --all-targets
      - name: cargo test (doc-tests)
        run: cargo test --workspace --doc

  bench:
    name: benchmark compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libfontconfig1-dev fonts-dejavu-core
      - name: cargo bench (compile only)
        run: cargo bench --workspace --no-run

  coverage:
    name: coverage (ubuntu / stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-llvm-cov
        run: cargo install --locked cargo-llvm-cov
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libfontconfig1-dev fonts-dejavu-core
      - name: cargo llvm-cov (workspace)
        run: |
          cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  msrv:
    name: MSRV 1.85 (ubuntu)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - name: cargo check MSRV
        run: cargo check --workspace --all-targets
