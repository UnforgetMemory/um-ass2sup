name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0). Leave empty to use latest tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build & verify on every target platform (matrix)
  # ---------------------------------------------------------------------------
  build-matrix:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            binary: ass2sup
            archive: tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            binary: ass2sup
            archive: tar.gz
            cross: true
            strip_tool: aarch64-linux-gnu-strip
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-aarch64
            binary: ass2sup
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            binary: ass2sup.exe
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain (linux-aarch64)
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libass-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"

      - name: Install system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libfontconfig1-dev libass-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install libass

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binary
        env:
          FEATURES: native-backend${{ runner.os != 'Windows' && ',libass-backend' || '' }}
        run: cargo build --release --locked --target ${{ matrix.target }} -p ass2sup-cli --no-default-features -F "$FEATURES"

      - name: Strip binary (linux/macos)
        if: matrix.archive == 'tar.gz'
        run: |
          BIN="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if [ -n "${{ matrix.strip_tool }}" ]; then
            ${{ matrix.strip_tool }} "$BIN"
          else
            strip "$BIN"
          fi
          ls -la "$BIN"
          file "$BIN"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          BIN="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          NAME="ass2sup-${{ github.ref_name }}-${{ matrix.label }}"
          mkdir -p "$NAME"
          cp "$BIN" "$NAME/"
          cp README.md "$NAME/"
          cp README.en.md "$NAME/"
          cp CHANGELOG.md "$NAME/"
          cp LICENSE-APACHE "$NAME/"
          tar -czf "${NAME}.tar.gz" "$NAME"
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          ls -la "${NAME}.tar.gz" "${NAME}.tar.gz.sha256"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $BIN = "target/${{ matrix.target }}/release/${{ matrix.binary }}"
          $NAME = "ass2sup-${{ github.ref_name }}-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path "$NAME" | Out-Null
          Copy-Item "$BIN" -Destination "$NAME/"
          Copy-Item "README.md" -Destination "$NAME/"
          Copy-Item "README.en.md" -Destination "$NAME/"
          Copy-Item "CHANGELOG.md" -Destination "$NAME/"
          Copy-Item "LICENSE-APACHE" -Destination "$NAME/"
          Compress-Archive -Path "$NAME/*" -DestinationPath "${NAME}.zip" -Force
          $hash = (Get-FileHash "${NAME}.zip" -Algorithm SHA256).Hash.ToLower()
          "${hash}  ${NAME}.zip" | Out-File -FilePath "${NAME}.zip.sha256" -Encoding ascii -NoNewline
          Get-ChildItem "${NAME}.zip", "${NAME}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ass2sup-${{ matrix.label }}
          path: |
            ass2sup-${{ github.ref_name }}-${{ matrix.label }}.${{ matrix.archive }}
            ass2sup-${{ github.ref_name }}-${{ matrix.label }}.${{ matrix.archive }}.sha256
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 2. Cargo publish dry-run (sanity check workspace can publish)
  # ---------------------------------------------------------------------------
  publish-dry-run:
    name: Publish dry-run
    needs: build-matrix
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: cargo publish dry-run (workspace)
        run: |
          set -e
          for crate in crates/*/Cargo.toml; do
            echo "=== $crate ==="
            cargo publish --dry-run --locked --no-verify --manifest-path "$crate"
          done

  # ---------------------------------------------------------------------------
  # 3. Create GitHub Release, attach all platform binaries
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: build-matrix
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Artifacts collected ==="
          ls -la artifacts/
          echo ""
          echo "=== SHA256 sums ==="
          find artifacts/ -type f \( -name '*.sha256' -o -name '*.tar.gz' -o -name '*.zip' \) -exec shasum -a 256 {} \;

      - name: Generate checksums manifest
        run: |
          cd artifacts
          shasum -a 256 ass2sup-*.*.{tar.gz,zip} 2>/dev/null | sort > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## um-ass2sup ${{ github.ref_name }}

            Convert ASS/SSA/SRT subtitles to Blu-ray **PGS / SUP** (and back to **SRT** / **BDN XML**).

            ### Prebuilt binaries

            Four platform builds are attached. Download the archive for your OS and architecture:

            | Platform | Asset |
            |----------|-------|
            | Linux x86_64 (glibc) | `ass2sup-${{ github.ref_name }}-linux-x86_64.tar.gz` |
            | Linux aarch64 (glibc) | `ass2sup-${{ github.ref_name }}-linux-aarch64.tar.gz` |
            | macOS (Apple Silicon, runs Intel via Rosetta 2) | `ass2sup-${{ github.ref_name }}-macos-aarch64.tar.gz` |
            | Windows x86_64 | `ass2sup-${{ github.ref_name }}-windows-x86_64.zip` |

            Each archive contains the binary, README (Chinese + English), CHANGELOG, and both LICENSE files.
            Linux and macOS builds include both rendering backends (use `--backend native` or `--backend libass`).
            Windows build includes native-backend only.
            A `SHA256SUMS` manifest with checksums for every binary is included in the artifacts and listed below.

            ### Quick start

            ```bash
            # Linux / macOS
            tar -xzf ass2sup-${{ github.ref_name }}-linux-x86_64.tar.gz
            ./ass2sup-linux-x86_64/ass2sup --help

            # Windows (PowerShell)
            Expand-Archive ass2sup-${{ github.ref_name }}-windows-x86_64.zip
            .\ass2sup-windows-x86_64\ass2sup.exe --help
            ```

            ### Verify

            ```bash
            shasum -a 256 -c SHA256SUMS
            ```

            ### What's new

            See [`CHANGELOG.md`](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for the full list of changes, fixes, and performance improvements.

            ### Requirements

            - **Linux / macOS:** no runtime dependencies (native-backend is pure Rust). libass-backend requires `libass.so.9` on the system path.
            - **Windows:** no runtime dependencies (native-backend is pure Rust). libass-backend requires `libass.dll` on the system path.
            - **MSRV:** Rust 1.89+ (only required if building from source).
          files: |
            artifacts/ass2sup-*.tar.gz
            artifacts/ass2sup-*.zip
            artifacts/*.sha256
            artifacts/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
