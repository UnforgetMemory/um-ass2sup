[workspace]
resolver = "2"
members = [
    "crates/ass-parser",
    "crates/subtitle-validator",
    "crates/subtitle-renderer",
    "crates/color-quantizer",
    "crates/bdn-xml",
    "crates/pgs-encoder",
    "crates/ass2sup-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
repository = "https://github.com/user/ass2sup"

[workspace.dependencies]
ass-parser = { path = "crates/ass-parser" }
subtitle-validator = { path = "crates/subtitle-validator" }
subtitle-renderer = { path = "crates/subtitle-renderer" }
color-quantizer = { path = "crates/color-quantizer" }
bdn-xml = { path = "crates/bdn-xml" }
pgs-encoder = { path = "crates/pgs-encoder" }

thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
clap = { version = "4", features = ["derive"] }
rayon = "1"
indicatif = "0.17"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
