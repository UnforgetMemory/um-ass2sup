[workspace]
resolver = "2"
exclude = ["crates/*/fuzz"]
members = [
    "crates/ass-parser",
    "crates/subtitle-validator",
    "crates/subtitle-renderer",
    "crates/color-quantizer",
    "crates/bdn-xml",
    "crates/pgs-encoder",
    "crates/ass2sup-cli",
]

[workspace.package]
version = "0.2.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
repository = "https://github.com/UnforgetMemory/um-ass2sup"
description = "ASS/SSA/SRT to Blu-ray SUP/PGS subtitle converter written in Rust"
keywords = ["subtitle", "blu-ray", "pgs", "sup", "ass"]
categories = ["multimedia", "command-line-utilities"]

[workspace.dependencies]
ass-parser = { path = "crates/ass-parser" }
subtitle-validator = { path = "crates/subtitle-validator" }
subtitle-renderer = { path = "crates/subtitle-renderer" }
color-quantizer = { path = "crates/color-quantizer" }
bdn-xml = { path = "crates/bdn-xml" }
pgs-encoder = { path = "crates/pgs-encoder" }

thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
clap = { version = "4", features = ["derive"] }
rayon = "1"
indicatif = "0.17"
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
